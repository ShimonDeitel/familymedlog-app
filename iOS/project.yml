name: FamilyMedicalLog
options:
  bundleIdPrefix: com.shimondeitel.familymedlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  FamilyMedicalLog:
    type: application
    platform: iOS
    sources:
      - path: FamilyMedicalLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.familymedlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: FamilyMedicalLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FamilyMedicalLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FamilyMedicalLogTests
      - path: FamilyMedicalLog.storekit
    dependencies:
      - target: FamilyMedicalLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.familymedlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FamilyMedicalLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FamilyMedicalLogUITests
    dependencies:
      - target: FamilyMedicalLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.familymedlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  FamilyMedicalLog:
    build:
      targets:
        FamilyMedicalLog: all
        FamilyMedicalLogTests: [test]
        FamilyMedicalLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: FamilyMedicalLog.storekit
    test:
      config: Debug
      storeKitConfiguration: FamilyMedicalLog.storekit
      targets:
        - FamilyMedicalLogTests
        - FamilyMedicalLogUITests
    archive:
      config: Release
